---
# *arr/Bazarr/Prowlarr: use Docker DNS (http://prowlarr:9696 etc.), not localhost — old setup shared tailscale netns.
# tailnet_tcp_proxy: apps listen on the bridge + host-published ports; tsmonster holds the 100.x IP. Without these socats, tailnet clients hitting tsmonster:8989 etc. get nothing.
services:
  tailscale:
    container_name: tsmonster
    hostname: tsmonster
    image: tailscale/tailscale:latest
    networks:
      - internal
    volumes:
      - ~/services/tailscale/config:/var/lib
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    environment:
      - PUID=1000
      - PGID=1000
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=${TS_HOSTNAME}
      - TS_USERSPACE=false
      - TS_AUTH_ONCE=false
      - TS_EXTRA_ARGS=--ssh
    command: tailscaled
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  heimdall:
    image: lscr.io/linuxserver/heimdall:latest
    container_name: heimdall
    networks:
      - internal
    ports:
      - "8087:80"
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ~/services/heimdall/config:/config
    restart: always

  archivebox:
    container_name: archivebox
    image: "archivebox/archivebox:latest"
    networks:
      - internal
    ports:
      - "8010:8000"
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ~/services/archivebox/data/:/data/
    restart: always

  bazarr:
    container_name: bazarr
    image: "linuxserver/bazarr:latest"
    networks:
      - internal
    ports:
      - "6767:6767"
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ~/services/bazarr/config:/config
      - /mnt/drive1/TV:/TV1
      - /mnt/drive1/Movies:/Movies1
      - /mnt/drive2/TV:/TV2
      - /mnt/drive2/Movies:/Movies2
      - /mnt/drive3/TV:/TV3
      - /mnt/drive3/Movies:/Movies3
      - /mnt/drive4/TV:/TV4
      - /mnt/drive4/Movies:/Movies4
      - /mnt/drive5/TV:/TV5
      - /mnt/drive5/Movies:/Movies5
#      - /mnt/drive6/TV:/TV6
#      - /mnt/drive6/Movies:/Movies6
      - /mnt/drive7/TV:/TV7
      - /mnt/drive7/Movies:/Movies7
#      - /mnt/drive8/TV:/TV8
#      - /mnt/drive8/Movies:/Movies8
      - /mnt/drive9/TV:/TV9
      - /mnt/drive9/Movies:/Movies9
      - /mnt/drive10/TV:/TV10
      - /mnt/drive10/Movies:/Movies10
      - /mnt/drive11/TV:/TV11
      - /mnt/drive11/Movies:/Movies11
    depends_on:
      - sonarr
      - radarr
    restart: always

  prowlarr:
    container_name: prowlarr
    image: "lscr.io/linuxserver/prowlarr:latest"
    networks:
      - internal
    ports:
      - "9696:9696"
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ~/services/prowlarr/config:/config
    depends_on:
      - flaresolverr
    restart: always

  flaresolverr:
    container_name: flaresolverr
    image: "ghcr.io/flaresolverr/flaresolverr:latest"
    networks:
      - internal
    ports:
      - "8191:8191"
    environment:
      - PUID=1000
      - PGID=1000
    restart: always

  duplicati:
    container_name: duplicati
    image: "lscr.io/linuxserver/duplicati:latest"
    networks:
      - internal
    ports:
      - "8200:8200"
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ~/services/duplicati/config:/config
      - ~/services/duplicati/restore:/restore
      - ~/services/duplicati/backups:/backups
      - ~/services/duplicati/source:/source
    restart: always

  filegator:
    container_name: filegator
    image: "filegator/filegator"
    networks:
      - internal
    ports:
      - "8089:8080"
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - /mnt/drive1:/var/www/filegator/repository/drive1
      - /mnt/drive2:/var/www/filegator/repository/drive2
      - /mnt/drive3:/var/www/filegator/repository/drive3
      - /mnt/drive4:/var/www/filegator/repository/drive4
      - /mnt/drive5:/var/www/filegator/repository/drive5
#      - /mnt/drive6:/var/www/filegator/repository/drive6
      - /mnt/drive7:/var/www/filegator/repository/drive7
#      - /mnt/drive8:/var/www/filegator/repository/drive8
      - /mnt/drive9:/var/www/filegator/repository/drive9
      - /mnt/drive10:/var/www/filegator/repository/drive10
      - /mnt/drive11:/var/www/filegator/repository/drive11
      - /home/rowan/:/var/www/filegator/repository/home

  plex:
    container_name: plex
    image: "linuxserver/plex:latest"
    networks:
      - internal
    ports:
      - 32400:32400
      - 1900:1900/udp
      - 5353:5353/udp
      - 8324:8324
      - 32410:32410/udp
      - 32412:32412/udp
      - 32413:32413/udp
      - 32414:32414/udp
      - 32469:32469
    environment:
      - PUID=1000
      - PGID=1000
      - VERSION=docker
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ~/services/plex/config:/config
      - ~/services/plex/transcode:/transcode
      - ~/services/plex/data:/data
      - /mnt/drive1/TV:/TV1
      - /mnt/drive1/Movies:/Movies1
      - /mnt/drive2/TV:/TV2
      - /mnt/drive2/Movies:/Movies2
      - /mnt/drive3/TV:/TV3
      - /mnt/drive3/Movies:/Movies3
      - /mnt/drive4/TV:/TV4
      - /mnt/drive4/Movies:/Movies4
      - /mnt/drive5/TV:/TV5
      - /mnt/drive5/Movies:/Movies5
#      - /mnt/drive6/TV:/TV6
#      - /mnt/drive6/Movies:/Movies6
      - /mnt/drive7/TV:/TV7
      - /mnt/drive7/Movies:/Movies7
#      - /mnt/drive8/TV:/TV8
#      - /mnt/drive8/Movies:/Movies8
      - /mnt/drive9/TV:/TV9
      - /mnt/drive9/Movies:/Movies9
      - /mnt/drive10/TV:/TV10
      - /mnt/drive10/Movies:/Movies10
      - /mnt/drive11/TV:/TV11
      - /mnt/drive11/Movies:/Movies11
    restart: always

  radarr:
    container_name: radarr
    image: lscr.io/linuxserver/radarr:latest
    networks:
      - internal
    ports:
      - "7878:7878"
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ~/services/radarr/config:/config
      - /mnt/drive1/Movies:/Movies1
      - /mnt/drive2/Movies:/Movies2
      - /mnt/drive3/Movies:/Movies3
      - /mnt/drive4/Movies:/Movies4
      - /mnt/drive5/Movies:/Movies5
#      - /mnt/drive6/Movies:/Movies6
      - /mnt/drive7/Movies:/Movies7
#      - /mnt/drive8/Movies:/Movies8
      - /mnt/drive9/Movies:/Movies9
      - /mnt/drive10/Movies:/Movies10
      - /mnt/drive11/Movies:/Movies11
      - /mnt/remote/:/downloads/complete
    depends_on:
      - prowlarr
    restart: always

  sonarr:
    container_name: sonarr
    image: lscr.io/linuxserver/sonarr:latest
    networks:
      - internal
    ports:
      - "8989:8989"
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ~/services/sonarr/config:/config
      - /mnt/drive1/TV:/TV1
      - /mnt/drive2/TV:/TV2
      - /mnt/drive3/TV:/TV3
      - /mnt/drive4/TV:/TV4
      - /mnt/drive5/TV:/TV5
#      - /mnt/drive6/TV:/TV6
      - /mnt/drive7/TV:/TV7
#      - /mnt/drive8/TV:/TV8
      - /mnt/drive9/TV:/TV9
      - /mnt/drive10/TV:/TV10
      - /mnt/drive11/TV:/TV11
      - /mnt/remote/:/downloads/complete
    depends_on:
      - prowlarr
    restart: always

  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich_server
    networks:
      - immich_internal
    ports:
      - "2283:2283"
    depends_on:
      immich-redis:
        condition: service_healthy
      immich-database:
        condition: service_healthy
      immich-machine-learning:
        condition: service_started
    environment:
      TZ: UTC
      IMMICH_LOG_LEVEL: warn
      IMMICH_PUBLIC_URL: https://immich.rowan.sh
      DB_HOSTNAME: immich-database
      DB_USERNAME: immich
      DB_PASSWORD: immich
      DB_DATABASE_NAME: immich
      REDIS_HOSTNAME: immich-redis
    volumes:
      - ~/photos:/data
      - ~/photos:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich_ml
    networks:
      - immich_internal
    volumes:
      - ~/services/immich/cache:/cache
    restart: unless-stopped

  immich-database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    container_name: immich_postgres
    networks:
      - immich_internal
    environment:
      POSTGRES_USER: immich
      POSTGRES_PASSWORD: immich
      POSTGRES_DB: immich
    volumes:
      - ~/services/immich/db:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U immich -d immich
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  immich-redis:
    image: docker.io/valkey/valkey:8@sha256:81db6d39e1bba3b3ff32bd3a1b19a6d69690f94a3954ec131277b9a26b95b3aa
    container_name: immich_redis
    networks:
      - immich_internal
    volumes:
      - ~/services/immich/redis:/data
    healthcheck:
      test: valkey-cli ping
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Use a directory bind for Headscale config (avoids file-mount "not a directory" runc errors):
  #   mkdir -p ~/services/headplane/headscale-ro && scp mill:~/services/headscale/config.yaml ~/services/headplane/headscale-ro/config.yaml
  headplane:
    image: ghcr.io/tale/headplane:latest
    container_name: headplane
    networks:
      - internal
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      HEADPLANE_SERVER__BASE_URL: ${HEADPLANE_BASE_URL:?set HEADPLANE_BASE_URL e.g. https://hs.rowan.sh}
      HEADPLANE_SERVER__COOKIE_SECRET: ${HEADPLANE_COOKIE_SECRET:?openssl rand -hex 16}
      HEADPLANE_HEADSCALE__URL: https://headscale.rowan.sh
      HEADPLANE_HEADSCALE__PUBLIC_URL: https://headscale.rowan.sh
    volumes:
      - ~/services/headplane/config.yaml:/etc/headplane/config.yaml
      - ~/services/headplane/data:/var/lib/headplane
      - ~/services/headplane/headscale-ro:/etc/headscale:ro
    restart: unless-stopped

  tailnet_tcp_proxy:
    image: alpine/socat:latest
    container_name: tailnet_tcp_proxy
    network_mode: service:tailscale
    depends_on:
      - tailscale
      - immich-server
      - headplane
      - sonarr
      - radarr
      - prowlarr
      - bazarr
      - flaresolverr
      - duplicati
      - heimdall
      - archivebox
      - filegator
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        socat tcp-listen:2283,fork,reuseaddr tcp-connect:host.docker.internal:2283 &
        socat tcp-listen:3000,fork,reuseaddr tcp-connect:host.docker.internal:3000 &
        socat tcp-listen:8989,fork,reuseaddr tcp-connect:host.docker.internal:8989 &
        socat tcp-listen:7878,fork,reuseaddr tcp-connect:host.docker.internal:7878 &
        socat tcp-listen:9696,fork,reuseaddr tcp-connect:host.docker.internal:9696 &
        socat tcp-listen:6767,fork,reuseaddr tcp-connect:host.docker.internal:6767 &
        socat tcp-listen:8191,fork,reuseaddr tcp-connect:host.docker.internal:8191 &
        socat tcp-listen:8200,fork,reuseaddr tcp-connect:host.docker.internal:8200 &
        socat tcp-listen:8087,fork,reuseaddr tcp-connect:host.docker.internal:8087 &
        socat tcp-listen:8010,fork,reuseaddr tcp-connect:host.docker.internal:8010 &
        socat tcp-listen:8089,fork,reuseaddr tcp-connect:host.docker.internal:8089 &
        wait
    restart: unless-stopped

networks:
  internal:
    driver: bridge
  immich_internal:
    driver: bridge
