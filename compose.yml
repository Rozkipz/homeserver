  immich-server:
    image: ghcr.io/immich-app/immich-server:commit-d41921247bdf00e52635ce79805598ef548f4838
    container_name: immich_server
    depends_on:
      - immich-redis
      - immich-database
      - immich-machine-learning
    network_mode: service:tailscale   # shares Tailscale network
#    ports:
#      - "2283:2283"   # optional, only if you want host access outside Tailscale
# Cant use with network_mode
    environment:
      TZ: "UTC"
      IMMICH_LOG_LEVEL: "warn"
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: immich
      DATABASE_PASSWORD: immich
      DATABASE_NAME: immich
      REDIS_HOST: localhost
      REDIS_PORT: 6379
    volumes:
      - ~/photos:/usr/src/app/upload       # your photo library + new uploads
    restart: unless-stopped

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:commit-07eb270706aff28b9cb9498bf024ff9a9cef0606
    container_name: immich_ml
    network_mode: service:tailscale
    volumes:
      - ~/services/immich/cache:/cache    # ML cache
    restart: unless-stopped

  immich-database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    container_name: immich_postgres
    network_mode: service:tailscale
    environment:
      POSTGRES_USER: immich
      POSTGRES_PASSWORD: immich
      POSTGRES_DB: immich
    volumes:
      - ~/services/immich/db:/var/lib/postgresql/data
    restart: unless-stopped

  immich-redis:
    image: docker.io/valkey/valkey:8@sha256:81db6d39e1bba3b3ff32bd3a1b19a6d69690f94a3954ec131277b9a26b95b3aa
    container_name: immich_redis
    network_mode: service:tailscale
    volumes:
      - ~/services/immich/redis:/data
    restart: unless-stopped

networks:
  internal:
    driver: bridge

