#      - ~/services/filegator/configuration.php:/var/www/filegator/configuration.php

  plex:
    container_name: plex
    image: "linuxserver/plex:latest"
    networks:
      - internal
    # Enable once GPU is installed
    #deploy:
    #  resources:
    #    reservations:
    #      devices:
    #        - capabilities: [gpu]
    ports:
      - 32400:32400
      - 1900:1900/udp
      - 5353:5353/udp
      - 8324:8324
      - 32410:32410/udp
      - 32412:32412/udp
      - 32413:32413/udp
      - 32414:32414/udp
      - 32469:32469
    environment:
      - PUID=1000
      - PGID=1000
      - VERSION=docker
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ~/services/plex/config:/config
      - ~/services/plex/transcode:/transcode
      - ~/services/plex/data:/data
      - /mnt/drive1/TV:/TV1
      - /mnt/drive1/Movies:/Movies1
      - /mnt/drive2/TV:/TV2
      - /mnt/drive2/Movies:/Movies2
      - /mnt/drive3/TV:/TV3
      - /mnt/drive3/Movies:/Movies3
      - /mnt/drive4/TV:/TV4
      - /mnt/drive4/Movies:/Movies4
      - /mnt/drive5/TV:/TV5
      - /mnt/drive5/Movies:/Movies5
#      - /mnt/drive6/TV:/TV6
