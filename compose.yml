  filegator:
    container_name: filegator
    image: "filegator/filegator"
    network_mode: service:tailscale
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - /mnt/drive1:/var/www/filegator/repository/drive1
