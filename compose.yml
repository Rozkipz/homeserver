---
version: "1"
services:
  tailscale:
    container_name: tsmonster
    hostname: tsmonster
    image: tailscale/tailscale:latest
    networks:
      - internal
    volumes:
      - ~/services/tailscale/config:/var/lib
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    environment:
      - PUID=1000
      - PGID=1000
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=${TS_HOSTNAME}
      - TS_USERSPACE=false
      - TS_AUTH_ONCE=false
#      - TS_EXTRRA_FLAGS=--SSH
    command: tailscaled
    restart: always

  dockerui:
    container_name: dockerui
    image: "otothea/docker-ui:latest"
    environment:
      - PUID=1000
      - PGID=1000
    network_mode: service:tailscale
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
#     ports:
#       - "9898:9898"

  heimdall:
    image: lscr.io/linuxserver/heimdall:latest
    network_mode: service:tailscale
    container_name: heimdall
    environment:
      - PUID=1000
      - PGID=1000
#     ports:
#       - 80:80
#       - 443:443
    volumes:
      - ~/services/heimdall/config:/config
    restart: always

#   whitebophir:
#     image: lovasoa/wbo:latest
#     container_name: whitebophir
#     networks:
#       - docker_bridge
#     volumes:
#       - ~/services/whitebophir:/opt/app/server-data
