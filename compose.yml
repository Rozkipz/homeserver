      - PUID=1000
      - PGID=1000
    volumes:
      - ~/services/sonarr/config:/config
      - /mnt/drive1/TV:/TV1
      - /mnt/drive2/TV:/TV2
      - /mnt/drive3/TV:/TV3
      - /mnt/drive4/TV:/TV4
      - /mnt/drive5/TV:/TV5
