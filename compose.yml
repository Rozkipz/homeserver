      - /mnt/drive9/TV:/TV9
      - /mnt/drive10/TV:/TV10
      - /mnt/drive11/TV:/TV11
      - /mnt/remote/:/downloads/complete  # *arr is just retarded, won't map the folders properly? Just mount in with `/complete/`
    depends_on:
      - prowlarr
    restart: always

