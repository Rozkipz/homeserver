---
services:
  tailscale:
    container_name: tsmill
    hostname: tsmill
    image: tailscale/tailscale:latest
    volumes:
      - ~/services/tailscale/config:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    environment:
      - PUID=1001
      - PGID=1001
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=${TS_HOSTNAME}
      - TS_USERSPACE=false
      - TS_AUTH_ONCE=false
      - TS_EXTRA_ARGS=${TS_EXTRA_ARGS:?set TS_EXTRA_ARGS in .env}
      - TS_STATE_DIR=/var/lib/tailscale
    # default CMD runs containerboot (tailscaled + tailscale up + TS_AUTHKEY). command: tailscaled alone → NeedsLogin forever
    networks:
      - docker_bridge
    depends_on:
      - headscale
    restart: always

  # TCP tsmill tailnet -> monster HOST tailnet IP (native Tailscale; Docker publishes ports on 0.0.0.0 there). Caddy: reverse_proxy http://tailscale:<listen_port>
  # Add more: socat tcp-listen:<L>,fork,reuseaddr tcp-connect:$${TAILNET_RELAY_TARGET}:<remote> &
  tailnet-relay:
    image: alpine/socat:latest
    container_name: tailnet_relay
    network_mode: service:tailscale
    env_file:
      - .env
    environment:
      TAILNET_RELAY_TARGET: ${HOMESERVER_TAILNET_IP:?set HOMESERVER_TAILNET_IP in .env}
    depends_on:
      - tailscale
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        socat tcp-listen:2284,fork,reuseaddr tcp-connect:$${TAILNET_RELAY_TARGET}:2283 &
        socat tcp-listen:2300,fork,reuseaddr tcp-connect:$${TAILNET_RELAY_TARGET}:3000 &
        wait
    restart: always

  ombi:
    container_name: ombi
    image: "linuxserver/ombi:latest"
    networks:
      - docker_bridge
    ports:
      - "3579:3579"
    environment:
      - PUID=1001
      - PGID=1001
    volumes:
      - ~/services/ombi/config:/config
    restart: always

  headscale:
    image: headscale/headscale:v0.28.0  # Do not update willy nilly, you should check for breaking upgrades first
    container_name: headscale
    networks:
      - docker_bridge
    entrypoint: headscale serve
    labels:
      me.tale.headplane.target: headscale
    volumes:
      - ~/services/headscale:/etc/headscale
    environment:
      - PUID=1001
      - PGID=1001
    restart: always

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    env_file:
      - .env
    depends_on:
      - ombi
      - rutorrent
      - tailnet-relay
    volumes:
      - ~/services/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ~/services/caddy/data:/data
      - ~/services/caddy/config:/config
    networks:
      - docker_bridge
    ports:
      - 80:80
      - 443:443
    restart: always

  unpackerr:
    container_name: unpackerr
    image: "golift/unpackerr:latest"
    networks:
      - docker_bridge
    volumes:
      - ~/services/unpackerr/config:/config
      - ~/services/rtorrent/downloads/complete:/downloads/complete
    environment:
      - PUID=1000
      - PGID=1000
    restart: always

  rutorrent:
    image: crazymax/rtorrent-rutorrent:latest
    container_name: rutorrent
    networks:
      - docker_bridge
    # Caddy reaches rutorrent:8000 / :8080 on docker_bridge; bind HTTP services to loopback only (no cleartext creds on WAN).
    # Caddyfile: handle /RPC2* { reverse_proxy http://rutorrent:8000 }; handle { reverse_proxy http://rutorrent:8080 }
    ports:
      - 6881:6881/tcp
      - 6881:6881/udp
      - 127.0.0.1:8000:8000
      - 127.0.0.1:8080:8080
      - 50000:50000/tcp
      - 50000:50000/udp
    env_file:
      - rtorrent-rutorrent.env
    volumes:
      - ~/services/rtorrent/data:/data
      - ~/services/rtorrent/downloads:/downloads
      - ~/services/rtorrent/passwd:/passwd
      - ~/services/rtorrent/log:/log
    restart: always

networks:
  docker_bridge:
    driver: bridge
